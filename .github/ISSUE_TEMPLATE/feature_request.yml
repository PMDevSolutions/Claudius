name: Feature Request
description: Suggest a new feature or improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
      attributes:
            value: |
                    Thanks for suggesting a feature! Please fill out the form below.

                      - type: textarea
                          id: description
                              attributes:
                                    label: Description
                                          description: A clear and concise description of the feature you'd like.
                                                placeholder: Describe the feature...
                                                    validations:
                                                          required: true

                                                            - type: textarea
                                                                id: use-case
                                                                    attributes:
                                                                          label: Use Case
                                                                                description: Describe the problem this feature would solve or the use case it enables.
                                                                                      placeholder: I want this feature because...
                                                                                          validations:
                                                                                                required: true

                                                                                                  - type: textarea
                                                                                                      id: proposed-solution
                                                                                                          attributes:
                                                                                                                label: Proposed Solution
                                                                                                                      description: Describe how you'd like this feature to work.
                                                                                                                            placeholder: The feature should...
                                                                                                                                validations:
                                                                                                                                      required: true
                                                                                                                                      
                                                                                                                                        - type: textarea
                                                                                                                                            id: alternatives
                                                                                                                                                attributes:
                                                                                                                                                      label: Alternatives Considered
                                                                                                                                                            description: Describe any alternative solutions or workarounds you've considered.
                                                                                                                                                                  placeholder: I've also considered...
                                                                                                                                                                      validations:
                                                                                                                                                                            required: false
