name: Bug Report
description: Report a bug or unexpected behavior
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill out the form below so we can reproduce and fix the issue.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
      placeholder: Describe the bug...
    validations:
      required: true

  - type: textarea
    id: steps-to-reproduce
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Embed widget on a page with '...'
        2. Click '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected-behavior
    attributes:
      label: Expected Behavior
      description: What you expected to happen.
      placeholder: Describe the expected behavior...
    validations:
      required: true

  - type: textarea
    id: actual-behavior
    attributes:
      label: Actual Behavior
      description: What actually happened.
      placeholder: Describe what actually happened...
    validations:
      required: true

  - type: dropdown
    id: package
    attributes:
      label: Which package?
      description: Where does the bug occur?
      options:
        - Widget (React component / embed)
        - Worker (Cloudflare Worker backend)
        - CLI / scripts
        - Documentation
        - Not sure
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Claudius Version
      description: Version or commit SHA you're running
      placeholder: 0.5.0
    validations:
      required: true

  - type: input
    id: browser
    attributes:
      label: Browser
      description: e.g. Chrome 120, Firefox 121, Safari 17.2
      placeholder: Chrome 120
    validations:
      required: false

  - type: input
    id: os
    attributes:
      label: Operating System
      description: e.g. Windows 11, macOS 14.3, Ubuntu 22.04
      placeholder: Windows 11
    validations:
      required: false

  - type: input
    id: node-version
    attributes:
      label: Node.js Version
      description: Output of `node --version` (only if reproducing locally)
      placeholder: v20.11.0
    validations:
      required: false

  - type: input
    id: pnpm-version
    attributes:
      label: pnpm Version
      description: Output of `pnpm --version` (only if reproducing locally)
      placeholder: 9.0.0
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Console / Worker Logs
      description: Any relevant browser console errors or `wrangler tail` output.
      render: shell
    validations:
      required: false

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: If applicable, add screenshots to help explain the problem.
      placeholder: Drag and drop screenshots here...
    validations:
      required: false
