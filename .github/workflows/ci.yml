name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    name: Validate Framework
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check shell scripts syntax
        run: |
          errors=0
          for f in scripts/*.sh; do
            if [ -f "$f" ]; then
              echo "Checking $f..."
              bash -n "$f" || errors=$((errors + 1))
            fi
          done
          exit $errors

      - name: Validate JSON configs
        run: |
          errors=0
          for f in package.json; do
            if [ -f "$f" ]; then
              echo "Checking $f..."
              python3 -m json.tool "$f" > /dev/null || errors=$((errors + 1))
            fi
          done
          exit $errors

      - name: Check required files exist
        run: |
          exit_code=0
          required_files=(
            "CLAUDE.md"
            "package.json"
            "scripts/lint-and-format.sh"
            "scripts/run-tests.sh"
            "scripts/check-types.sh"
          )
          for f in "${required_files[@]}"; do
            if [ -f "$f" ]; then
              echo "  $f: OK"
            else
              echo "  $f: MISSING"
              exit_code=1
            fi
          done
          exit $exit_code

      - name: Check scripts are executable
        run: |
          for f in scripts/*.sh; do
            if [ -f "$f" ]; then
              if [ ! -x "$f" ]; then
                echo "WARNING: $f is not executable"
              else
                echo "  $f: OK"
              fi
            fi
          done
